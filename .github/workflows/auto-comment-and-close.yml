name: Auto Comment and Close Issues

on:
  issues:
    types: [opened, labeled]

jobs:
  auto-comment-close:
    runs-on: ubuntu-latest

    steps:
      - name: Check labels and respond
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(label => label.name.toLowerCase());

            if (labels.includes('feedback') || labels.includes('suggestion')) {
              // Add a thank-you comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: 'Thank you for your contribution!'
              });

              // Close the issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });

              console.log(`Issue #${issue.number} commented and closed.`);
            } else {
              console.log(`Issue #${issue.number} does not have 'feedback' or 'suggestion' label. Skipping.`);
            }
